{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Massacote{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700;8..60,900&display=swap">
    <link rel="stylesheet" href="{% static 'post/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="wordmark" href="{% url 'post:list' %}">Massacote</a>
            <nav class="site-nav">
                {% if user.is_authenticated %}
                    <a class="site-nav__write" href="{% url 'post:create' %}">Write</a>
                    <span class="site-nav__user">{{ user.get_username }}</span>
                {% else %}
                    <a class="site-nav__write" href="{% url 'admin:login' %}">Sign in</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Massacote.</p>
    </footer>

    <script src="{% static 'post/js/autosize-textarea.js' %}"></script>
</body>
</html>
